trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

parameters:
  - name: acrname
    type: string
    default: academo
  - name: tier
    type: string
    default: 'frontend'
    values:
      - frontend
      - backend
      - worker
  - name: dockerFilePath
    type: string
    default: './Dockerfile.ui'

variables:
  tag: $(Build.BuildId)
  imageName: ${{ parameters.tier }}
  dockerFilePath: ${{ parameters.dockerFilePath }}
  buildContext: $(Build.SourcesDirectory)
  # Full path to your registry image
  registryPath: ${{ parameters.acrname }}.azurecr.io/$(imageName)

jobs:
  - job: buildAndPush
    displayName: Build and Push to ACR
    steps:
      - task: AzureCLI@2
        displayName: Login to ACR
        inputs:
          azureSubscription: 'acrsvc'
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            az acr login --name ${{ parameters.acrname }}

      - script: |
          echo "Setting up Docker Buildx..."
          # Create and use a new builder instance (required for cache features)
          docker buildx create --use --name pipeline-builder
          
          echo "Building and Pushing image with caching..."
          # This single command builds, uses cache, tags twice, and pushes to ACR
          docker buildx build \
            --cache-from=type=registry,ref=$(registryPath):buildcache \
            --cache-to=type=registry,ref=$(registryPath):buildcache,mode=max \
            -f $(dockerFilePath) \
            -t $(registryPath):$(tag) \
            -t $(registryPath):latest \
            --push \
            $(buildContext)
        displayName: 'Build and Push with Buildx Cache'

      - script: |
          echo "Build Complete."
          echo "Image 1: $(registryPath):$(tag)"
          echo "Image 2: $(registryPath):latest"
          echo "Cache: $(registryPath):buildcache"
        displayName: 'Final Summary'